<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groove — Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --wine: #2a1015;
    --wine-2: #1b0a0d;
    --gold: #d9a441;
    --gold-dim: #a97c30;
    --cream: #f4ead9;
    --panel: #3a1720;
    --dim: #c9a591;
    --vinyl: #16121a;
    --vinyl-groove: #211c26;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(circle at 30% 0%, rgba(217,164,65,0.08), transparent 45%),
      linear-gradient(160deg, var(--wine), var(--wine-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Manrope', sans-serif;
    color: var(--cream);
    padding:24px;
  }
  .player{
    width:100%; max-width:820px;
    background: rgba(0,0,0,0.18);
    border:1px solid rgba(217,164,65,0.15);
    border-radius:26px;
    padding:34px;
    display:grid;
    grid-template-columns: 260px 1fr;
    gap:36px;
    box-shadow: 0 40px 80px -30px rgba(0,0,0,0.6);
  }
  @media (max-width:680px){
    .player{ grid-template-columns:1fr; padding:24px; }
  }

  /* Vinyl */
  .disc-stage{
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .vinyl{
    width:220px; height:220px; border-radius:50%;
    background:
      repeating-radial-gradient(circle at center, var(--vinyl) 0px, var(--vinyl) 2px, var(--vinyl-groove) 3px, var(--vinyl) 4px);
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.03);
    display:flex; align-items:center; justify-content:center;
    animation: spin 6s linear infinite;
    animation-play-state: paused;
  }
  .vinyl.spinning{ animation-play-state: running; }
  .vinyl .label{
    width:88px; height:88px; border-radius:50%;
    background: linear-gradient(155deg, var(--gold), var(--gold-dim));
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 0 0 6px rgba(0,0,0,0.15);
  }
  .vinyl .label .hole{
    width:10px; height:10px; border-radius:50%;
    background: var(--wine-2);
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  /* Info + controls */
  .info{ display:flex; flex-direction:column; }
  .eyebrow{
    font-size:11px; letter-spacing:.3em; text-transform:uppercase;
    color: var(--gold); font-weight:700; margin-bottom:10px;
  }
  .track-title{
    font-family:'Fraunces', serif; font-size:32px; font-weight:700;
    margin-bottom:4px; line-height:1.15;
  }
  .track-artist{ color: var(--dim); font-size:15px; margin-bottom:22px; }

  .progress-row{
    display:flex; align-items:center; gap:10px; margin-bottom:18px;
  }
  .time{ font-size:12px; color: var(--dim); font-variant-numeric: tabular-nums; min-width:38px; }
  .progress-bar{
    flex:1; height:5px; border-radius:3px;
    background: rgba(244,234,217,0.15);
    position:relative; cursor:pointer;
  }
  .progress-fill{
    position:absolute; top:0; left:0; height:100%; border-radius:3px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    width:0%;
  }
  .progress-bar .knob{
    position:absolute; top:50%; width:12px; height:12px; border-radius:50%;
    background: var(--cream); transform: translate(-50%,-50%);
    left:0%; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  .controls{
    display:flex; align-items:center; justify-content:center; gap:18px;
    margin-bottom:24px;
  }
  .ctrl-btn{
    background:none; border:none; color: var(--cream);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    opacity:.85; transition: opacity .15s, transform .1s;
  }
  .ctrl-btn:hover{ opacity:1; }
  .ctrl-btn:active{ transform: scale(0.92); }
  .ctrl-btn.play{
    width:56px; height:56px; border-radius:50%;
    background: linear-gradient(155deg, var(--gold), var(--gold-dim));
    color: var(--wine-2);
    box-shadow: 0 10px 22px -8px rgba(217,164,65,0.6);
  }
  .ctrl-btn svg{ width:20px; height:20px; }
  .ctrl-btn.play svg{ width:22px; height:22px; }

  .bottom-row{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
  }
  .volume{
    display:flex; align-items:center; gap:8px; flex:1; max-width:150px;
  }
  .volume input[type="range"]{
    -webkit-appearance:none; width:100%; height:3px; border-radius:2px;
    background: rgba(244,234,217,0.2); outline:none;
  }
  .volume input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; width:11px; height:11px; border-radius:50%;
    background: var(--gold); cursor:pointer;
  }
  .volume svg{ width:16px; height:16px; color: var(--dim); flex-shrink:0; }

  /* Playlist */
  .playlist{
    margin-top:8px;
    max-height:120px; overflow-y:auto;
    display:flex; flex-direction:column; gap:2px;
  }
  .playlist::-webkit-scrollbar{ width:5px; }
  .playlist::-webkit-scrollbar-thumb{ background: rgba(217,164,65,0.3); border-radius:3px; }
  .track-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 10px; border-radius:8px; cursor:pointer;
    font-size:13px; color: var(--dim);
    transition: background .12s;
  }
  .track-item:hover{ background: rgba(244,234,217,0.06); }
  .track-item.active{ background: rgba(217,164,65,0.14); color: var(--cream); font-weight:700; }
  .track-item .dur{ font-size:11px; opacity:.7; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="player">
  <div class="disc-stage">
    <div class="vinyl" id="vinyl">
      <div class="label"><div class="hole"></div></div>
    </div>
  </div>

  <div class="info">
    <div class="eyebrow">NOW PLAYING</div>
    <div class="track-title" id="trackTitle">—</div>
    <div class="track-artist" id="trackArtist">—</div>

    <div class="progress-row">
      <span class="time" id="curTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="knob" id="progressKnob"></div>
      </div>
      <span class="time" id="durTime">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" title="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6L18 6v12z"/></svg>
      </button>
      <button class="ctrl-btn play" id="playBtn" title="Play/Pause">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" id="nextBtn" title="Next">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
      </button>
    </div>

    <div class="bottom-row">
      <div class="volume">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></svg>
        <input type="range" id="volumeSlider" min="0" max="100" value="70">
      </div>
    </div>

    <div class="playlist" id="playlist"></div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
// Replace src URLs below with your own mp3 files for a real project.
const TRACKS = [
  { title: "Song 1", artist: "SoundHelix Demo", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
  { title: "Song 2", artist: "SoundHelix Demo", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
  { title: "Song 3", artist: "SoundHelix Demo", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
  { title: "Song 4", artist: "SoundHelix Demo", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
];

let currentIndex = 0;
let isPlaying = false;

const audio = document.getElementById('audio');
const vinyl = document.getElementById('vinyl');
const trackTitle = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const progressKnob = document.getElementById('progressKnob');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');
const volumeSlider = document.getElementById('volumeSlider');
const playlistEl = document.getElementById('playlist');

const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
const ICON_PAUSE = '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';

function formatTime(sec){
  if (isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function renderPlaylist(){
  playlistEl.innerHTML = TRACKS.map((t, i) => `
    <div class="track-item ${i === currentIndex ? 'active' : ''}" data-i="${i}">
      <span>${t.title} · ${t.artist}</span>
      <span class="dur">${i === currentIndex ? '♪' : ''}</span>
    </div>
  `).join('');
  document.querySelectorAll('.track-item').forEach(el => {
    el.addEventListener('click', () => loadTrack(parseInt(el.dataset.i), true));
  });
}

function loadTrack(index, autoplay){
  currentIndex = (index + TRACKS.length) % TRACKS.length;
  const t = TRACKS[currentIndex];
  audio.src = t.src;
  trackTitle.textContent = t.title;
  trackArtist.textContent = t.artist;
  renderPlaylist();
  progressFill.style.width = '0%';
  progressKnob.style.left = '0%';
  curTimeEl.textContent = '0:00';
  if (autoplay) play();
}

function play(){
  audio.play().catch(() => {});
  isPlaying = true;
  playIcon.innerHTML = ICON_PAUSE;
  vinyl.classList.add('spinning');
}

function pause(){
  audio.pause();
  isPlaying = false;
  playIcon.innerHTML = ICON_PLAY;
  vinyl.classList.remove('spinning');
}

playBtn.addEventListener('click', () => { isPlaying ? pause() : play(); });
prevBtn.addEventListener('click', () => loadTrack(currentIndex - 1, true));
nextBtn.addEventListener('click', () => loadTrack(currentIndex + 1, true));

audio.addEventListener('timeupdate', () => {
  const pct = (audio.currentTime / audio.duration) * 100 || 0;
  progressFill.style.width = pct + '%';
  progressKnob.style.left = pct + '%';
  curTimeEl.textContent = formatTime(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  durTimeEl.textContent = formatTime(audio.duration);
});
audio.addEventListener('ended', () => loadTrack(currentIndex + 1, true));

progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

volumeSlider.addEventListener('input', () => {
  audio.volume = volumeSlider.value / 100;
});
audio.volume = 0.7;

loadTrack(0, false);
</script>
</body>
</html>
